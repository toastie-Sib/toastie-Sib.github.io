project_entries:
  - title: Spin Game Prototype
    url: https://toastie-sibley.itch.io/spin-demo
    desc: Physics based auto battling roguelike where each fighter scales growth and fights in a unique way. Build items to push how far you can go in a run!
    highlight: NEW

  - title: Tactical RPG Prototype
    url: https://toastie-sibley.itch.io/trpg-demo
    desc: Tactical RPG prototype with a variety of mechanics in its current state. Ready to be easily expanded on with more content and mechanics in the future!
    highlight: NEW

  - title: Dithering Demo
    url: https://toastie-sibley.itch.io/dithering-demo
    desc: Dithering shader demo. Move around and Control the Dithering Opacity as well as Quantization Levels! Choose between 20 different color palettes I've customized!
    highlight: NEW

  - title: Grapple Mechanic Demo
    url: https://toastie-sibley.itch.io/grapple-mechanic-demo
    desc: Grapple to surfaces and swing around them with two different grapples! Right click to grapple pull, and hold left click to grapple swing!
    highlight: NEW

  - title: Dungeon Delver
    url: https://toastie-sibley.itch.io/dungeon-delver
    desc: Unity game that is largely based on the original Zelda. Find the hookshot within the Dungeon!
    highlight: NEW

  - title: Pico 8 Celeste Recreation
    url: https://toastie-sibley.itch.io/celeste-pico-recreation
    desc: A recreation of the original Pico 8 version of Celeste made in Unity!
    highlight: NEW

  - title: GOAP Demo
    url: https://toastie-sibley.itch.io/goap-demo
    desc: Goal-Oriented Action Planning demo in Unity. NPCs will evaluate their current environment, select a goal, and plan a sequence of actions to best accomplish it.

  - title: Nighttail Chronicles
    url: https://david-bandila.itch.io/nighttailchronicles
    desc: A group project to create a 2D "horror" type of game with puzzle and exploration elements. 

  - title: Pogo Dasher
    url: https://toastie-sibley.itch.io/pogo-dasher
    desc: 2D platformer with enemies to defeat. You can attack downwards to be sent up, or charge a dash!

  - title: Tetris
    url: https://toastie-sibley.itch.io/tetris
    desc: Tetris Recreation in Unity

  - title: Space Shootout
    url: https://toastie-sibley.itch.io/shmup
    desc: 2D game similar to Galaga
    #highlight: WIP

  - title: Prospector
    url: https://toastie-sibley.itch.io/prospector
    desc: Card game mde in Unity
    #highlight: WIP


